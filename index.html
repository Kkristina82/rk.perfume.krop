    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: 'Poppins', sans-serif;
            
            /* --- ОСНОВНИЙ ФОН СТОРІНКИ --- */
            background: 
                linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.98)), 
                url("bg.jpg"); /* Використовуйте ваше фонове зображення bg.jpg */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            box-sizing: border-box;
            
            /* Внутрішнє світіння вікна */
            box-shadow: 
                inset 0 0 0 2px rgba(255,215,0,0.3),
                inset 0 0 120px rgba(0,0,0,0.9);
        }

        /* --- ВЕРХНІ ДЕКОРАТИВНІ ФОТО (парфуми в кутах) --- */
        
        .decor-bottle {
            position: fixed;
            z-index: 1;
            pointer-events: none;
            /* Золоте обведення та скруглення */
            border: 3px solid gold;
            border-radius: 20px;
            box-shadow: 0 0 25px rgba(255,215,0,0.5); /* Світіння */
            box-sizing: border-box;
            
            /* --- ВИПРАВЛЕНО: ЗАПОВНЕННЯ РАМКИ БЕЗ ЧОРНИХ КРАЇВ --- */
            object-fit: cover; /* Заповнює всю площу тегу img */
            object-position: center; /* Центрує зображення */
        }

        /* Верхній лівий флакон */
        .topLeft {
            top: 40px;
            left: 40px;
            width: 220px;
            height: 220px;
            animation: floatTop 8s ease-in-out infinite;
        }

        /* Верхній правий флакон */
        .topRight {
            top: 40px;
            right: 40px;
            width: 220px;
            height: 220px;
            animation: floatTop 9s ease-in-out infinite;
        }

        /* --- НИЖНІ ДЕКОРАТИВНІ ФОТО (CSS псевдоелементи) --- */
        
        body::before {
            content: "";
            position: fixed;
            left: 40px;
            bottom: 40px;
            width: 250px;
            height: 250px;
            
            /* --- ВИПРАВЛЕНО: ПРАВИЛЬНЕ ЗОБРАЖЕННЯ ТА ЗАПОВНЕННЯ --- */
            background-image: url("left.png"); /* Унікальний файл для лівого нижнього кута */
            background-repeat: no-repeat;
            background-size: cover; /* Заповнює всю площу псевдоелемента */
            background-position: center; /* Центрує зображення */
            
            /* Стилізація */
            border: 3px solid gold;
            border-radius: 20px;
            box-shadow: 0 0 25px rgba(255,215,0,0.5);
            animation: floatLeft 6s ease-in-out infinite;
            z-index: 1; 
            pointer-events: none;
        }

        body::after {
            content: "";
            position: fixed;
            right: 40px;
            bottom: 40px;
            width: 250px;
            height: 250px;
            
            /* --- ВИПРАВЛЕНО: ПРАВИЛЬНЕ ЗОБРАЖЕННЯ ТА ЗАПОВНЕННЯ --- */
            background-image: url("right.png"); /* Унікальний файл для правого нижнього кута */
            background-repeat: no-repeat;
            background-size: cover; /* Також cover, щоб не було чорних країв */
            background-position: center;
            
            /* Стилізація */
            border: 3px solid gold;
            border-radius: 20px;
            box-shadow: 0 0 25px rgba(255,215,0,0.5);
            animation: floatRight 7s ease-in-out infinite;
            z-index: 1;
            pointer-events: none;
        }

        /* --- АНІМАЦІЇ --- */
        @keyframes floatLeft { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        @keyframes floatRight { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-18px); } }
        @keyframes floatTop { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(10px); } }

        /* --- ЦЕНТРАЛЬНА КАРТКА КОНТЕНТУ --- */
        .container {
            text-align: center;
            width: 100%;
            max-width: 420px;
            backdrop-filter: blur(12px);
            padding: 40px 25px;
            border-radius: 30px;
            background: rgba(0,0,0,0.5);
            border: 2px solid gold;
            box-shadow: 
                0 15px 35px rgba(0,0,0,0.8),
                inset 0 0 20px rgba(255,215,0,0.15);
            z-index: 5;
            position: relative;
            box-sizing: border-box;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid gold;
            box-shadow: 0 0 25px rgba(255,215,0,0.6);
            object-fit: cover;
            margin-bottom: 20px;
        }

        h1 {
            color: gold;
            margin: 0 0 8px 0;
            letter-spacing: 1px;
            font-size: 30px;
            font-weight: 700;
        }

        p {
            opacity: 0.9;
            margin: 0 0 30px 0;
            font-size: 16px;
        }

        /* --- КНОПКИ/ПОСИЛАННЯ --- */
        .link {
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(255,215,0,0.05);
            color: gold;
            text-decoration: none;
            padding: 16px;
            margin: 14px 0;
            border-radius: 16px;
            border: 1px solid gold;
            transition: all 0.3s ease;
            font-weight: 500;
            font-size: 16px;
        }

        .link:hover {
            background: gold;
            color: black;
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 5px 15px rgba(255,215,0,0.3);
        }

        .main-btn {
            background: gold;
            color: black;
            font-weight: 700;
            box-shadow: 0 4px 10px rgba(255,215,0,0.2);
        }
        
        .main-btn:hover {
            background: white;
            border-color: white;
        }
        
        /* --- АДАПТАЦІЯ ДЛЯ МОБІЛЬНИХ ЕКРАНІВ --- */
        @media (max-width: 1024px) {
            /* Приховуємо фонові фото на мобільних, щоб не перекривали контент */
            .topLeft, .topRight, body::before, body::after {
                display: none !important;
            }
            
            body {
                padding: 10px;
                align-items: center;
            }
            
            .container {
                padding: 30px 20px;
                border-radius: 20px;
            }
        }

        @media (max-height: 650px) {
            body {
                align-items: flex-start;
                padding-top: 20px;
            }
        }
